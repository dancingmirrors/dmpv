# Key bindings specific to vo_default (requires libplacebo)
# These bindings only work when using the default video output driver
# which provides equalizer controls (gamma, brightness, contrast, saturation)
# and proper video pan/zoom support

# Positioning script binding - only works with vo_default (requires Lua)
#Ctrl+MBTN_LEFT script-binding positioning/drag-to-pan

# Video pan and zoom - only supported by vo_default
#Alt+left add video-pan-x  0.1
#Alt+right add video-pan-x -0.1
#Alt+up add video-pan-y  0.1
#Alt+down add video-pan-y -0.1
#Alt++ add video-zoom   0.1
#Alt+_ add video-zoom  -0.1
#Alt+BS set video-zoom 0 ; set video-pan-x 0 ; set video-pan-y 0

# Panscan - primarily for vo_default
#w add panscan -0.1
#W add panscan +0.1

# Equalizer controls - only supported by vo_default
#1 add contrast -1
#2 add contrast 1
#3 add brightness -1
#4 add brightness 1
#5 add gamma -1
#6 add gamma 1
#7 add saturation -1
#8 add saturation 1
