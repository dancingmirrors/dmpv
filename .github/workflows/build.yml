name: dmpv

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:stable-slim

    steps:
      - name: actions/checkout@v4
        uses: actions/checkout@v4

      - name: all
        run: |
          echo 'deb-src http://deb.debian.org/debian/ trixie main non-free-firmware contrib non-free' >> /etc/apt/sources.list
          apt-get update
          apt-get install -y build-essential clang git meson nasm ninja-build yasm
          apt-get build-dep -y mpv
          apt-get install -y libavutil-dev libavcodec-dev libavformat-dev libavdevice-dev \
                       libavfilter-dev libswscale-dev libswresample-dev libpostproc-dev \
                       libplacebo-dev

          apt-get build-dep -y libxkbcommon wayland-protocols
          apt-get install -y libdecor-0-dev

          set -x

          git clone --depth 1 https://gitlab.freedesktop.org/wayland/wayland.git --branch 1.23
          cd wayland
          meson setup --prefix=/usr/local -Ddocumentation=false build
          meson compile -C build
          ninja -C build install

          git clone --depth 1 https://gitlab.freedesktop.org/wayland/wayland-protocols.git --branch 1.41
          cd wayland-protocols
          meson setup --prefix=/usr/local build
          meson compile -C build
          ninja -C build install

          git clone --depth 1 https://github.com/ffmpeg/ffmpeg.git
          cd ffmpeg
          ./configure --enable-shared --prefix=/usr/local
          make -j4
          make install

          git clone --depth 1 --recursive https://github.com/haasn/libplacebo.git
          cd libplacebo
          meson setup --prefix=/usr/local build
          meson compile -C build
          ninja -C build install

          set -x

          apt-get install -y --reinstall git meson ninja-build

          git clone https://github.com/dancingmirrors/dmpv.git
          cd dmpv
          git config --global --add safe.directory "$(pwd)"

          CFLAGS="-Werror" ./configure
          CFLAGS="-Werror" make
          ninja -C build install
          ninja -C build uninstall

          CC=clang CFLAGS="-Werror" ./configure
          CC=clang CFLAGS="-Werror" make
          ninja -C build install
          ninja -C build uninstall

          ./configure --enable-lgpl
          ninja -C build
          ninja -C build install
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH ldd /usr/local/bin/dmpv
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH /usr/local/bin/dmpv
          ninja -C build uninstall

          CC=clang ./configure --enable-lgpl
          ninja -C build
          ninja -C build install
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH ldd /usr/local/bin/dmpv
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH /usr/local/bin/dmpv
          ninja -C build uninstall

          ./configure
          ninja -C build
          ninja -C build install
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH ldd /usr/local/bin/dmpv
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH /usr/local/bin/dmpv

          CC=clang ./configure
          ninja -C build
          ninja -C build install
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH ldd /usr/local/bin/dmpv
          LD_LIBRARY_PATH=/usr/local/lib/x86_64-linux-gnu:/usr/local/lib:LD_LIBRARY_PATH /usr/local/bin/dmpv

          rm -f /usr/local/lib/libav* /usr/local/lib/libplacebo*
          rm -f /usr/local/lib/x86_64-linux-gnu/libplacebo*
          rm -f /usr/local/lib/pkgconfig/*.pc
          rm -rf /usr/local/include/libav* /usr/local/include/libswscale /usr/local/include/libswresample /usr/local/include/libpostproc
          rm -rf /usr/local/include/libplacebo
          rm -f /usr/local/lib/x86_64-linux-gnu/pkgconfig/libplacebo.pc
          apt-get install -y --reinstall meson ninja-build

          CFLAGS="-Werror" ./configure
          CFLAGS="-Werror" ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang CFLAGS="-Werror" ./configure
          CFLAGS="-Werror" ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          ./configure --disable-libplacebo
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang ./configure --disable-libplacebo
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          apt-get purge -y libplacebo-dev
          apt-get install -y meson ninja-build
          git clone --depth 1 --recursive --branch v6.338.2 https://github.com/haasn/libplacebo.git
          cd libplacebo
          meson setup --prefix=/usr/local build
          meson compile -C build
          ninja -C build install
          cd ..

          ./configure
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang ./configure
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          ./configure --disable-gl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          ./configure --disable-egl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang ./configure --disable-gl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang ./configure --disable-egl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          ./configure --disable-gl --disable-egl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv

          CC=clang ./configure --disable-gl --disable-egl
          ninja -C build
          ninja -C build install
          ldd /usr/local/bin/dmpv
          /usr/local/bin/dmpv
